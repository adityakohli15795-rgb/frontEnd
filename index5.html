<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account - Fragrance Haven</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="navbar">
        <div class="logo">
            <img src="logo.jpeg" width=125px alt="logo">
        </div>
        <nav>
            <ul>
                <li><a href="index.html">HOME</a></li>
                <li><a href="index4.html">PRODUCTS</a></li>
                <li><a href="index2.html">ABOUT</a></li>
                <li><a href="index3.html">CONTACT US</a></li>
                <li><a href="index5.html">ACCOUNT</a></li>
                <li><a href="index6.html">NEW ARRIVALS</a></li>
                <li><a href="index7.html">SHOP NOW</a></li>
                <li><a href="index8.html">DEALS</a></li>
            </ul>
        </nav>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="Search perfumes...">
            <button id="searchBtn">&#128269;</button>
        </div>
    </div>

    <div class="account-page">
        <div class="container">
            <div class="account-box">
                <div class="form-box">
                    <h2>Login</h2>
                    <form id="loginForm">
                        <input type="text" id="loginUsername" placeholder="Username">
                        <input type="password" id="loginPassword" placeholder="Password">
                        <p id="loginMsg" style="display:none; font-size:14px; margin-bottom:10px;"></p>
                        <button type="submit" class="btn">Login</button>
                    </form>
                </div>
                <div class="form-box">
                    <h2>Register</h2>
                    <form id="registerForm">
                        <input type="text" id="regUsername" placeholder="Username">
                        <input type="email" id="regEmail" placeholder="Email">
                        <input type="password" id="regPassword" placeholder="Password">
                        <p id="registerMsg" style="display:none; font-size:14px; margin-bottom:10px;"></p>
                        <button type="submit" class="btn">Register</button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <div class="footer">
        <div class="container">
            <p class="copyright">© 2026 Fragrance Haven</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
